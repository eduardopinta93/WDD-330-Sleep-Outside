<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
        <div class="checkout-container">
          <form class="checkout-form" id="checkout-form">
            <fieldset>
              <legend>Customer Name</legend>
        
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" name="fname" required />
              <span class="error-msg" id="firstName-error"></span>
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" name="lname" required />
              <span class="error-msg" id="lastName-error"></span>
            </fieldset>
        
            <fieldset>
              <legend>Address</legend>
        
              <label for="street">Street Address</label>
              <input type="text" id="street" name="street" required />
              <span class="error-msg" id="street-error"></span>
        
              <label for="city">City</label>
              <input type="text" id="city" name="city" required />
              <span class="error-msg" id="city-error"></span>

        
              <label for="state">State</label>
              <input type="text" id="state" name="state" required />
              <span class="error-msg" id="state-error"></span>
        
              <label for="zip">Zip Code</label>
              <input type="text" id="zip" name="zip" required />
              <span class="error-msg" id="zip-error"></span>

            </fieldset>
        
            <fieldset>
              <legend>Payment</legend>
        
              <label for="cardNumber">Credit Card Number</label>
              <input type="text" id="cardNumber" name="cardNumber" required />
              <span class="error-msg" id="cardNumber-error"></span>
        
              <label for="expiration">Expiration Date</label>
              <input type="text" id="expiration" name="expiration" placeholder="MM/YY" required />
              <span class="error-msg" id="expiration-error"></span>
        
              <label for="securityCode">Security Code</label>
              <input type="text" id="securityCode" name="code" required />
              <span class="error-msg" id="securityCode-error"></span>
            </fieldset>
        
            <button type="submit" class="checkout-button">Checkout</button>
          </form>

          <div id="form-success" class="success-msg" style="display:none;">
            Your order has been placed successfully! Thank you for shopping with Sleep Outside.
          </div>
        
          <aside class="order-summary">
            <h3>Order Summary</h3>
            <p>Items: <span id="itemCount">0</span></p>
            <p>Subtotal: <span id="subtotal">$0.00</span></p>
            <p>Tax: <span id="tax">$0.00</span></p>
            <p>Shipping Estimate: <span id="shipping">$0.00</span></p>
            <p><strong>Order Total: <span id="orderTotal">$0.00</span></strong></p>
          </aside>
        </div>
      </section>
    </main>
    

    <footer id="main-footer"></footer>
  </body>
</html>
